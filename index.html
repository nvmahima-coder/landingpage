<!DOCTYPE html>
<html>
<head>
  <title>Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"> 
</head>




<body>

<!-- Things Section -->
<section class="things">
  <h2>Things you need to do</h2>
  <div class="things-container">

    <div class="thing-card">
      <h3>Sign Up</h3>
      <p>Complete your profile</p>
    </div>

    <div class="thing-card">
      <h3>Find Location</h3>
      <p>Search your destination</p>
    </div>

    <div class="thing-card">
      <h3>Book Trip</h3>
      <p>Enjoy your journey</p>
    </div>

  </div>
</section>

<section class="deals">
  <h2>Exclusive deals & discounts</h2>

  <div class="deal-cards">

    <div class="deal">
      <img src="https://picsum.photos/200/150">
      <p>Paris</p>
    </div>

    <div class="deal">
      <img src="https://picsum.photos/200/150">
      <p>London</p>
    </div>

    <div class="deal">
      <img src="https://picsum.photos/200/150">
      <p>Dubai</p>
    </div>

  </div>
</section>

<section class="vacation">
  <h2>Best vacation plan</h2>

  <div class="vacation-cards">

    <div class="vac-card">
      <img src="https://picsum.photos/200/150" alt="Italy">
      <h3>Italy</h3>
      <p>$500</p>
    </div>

    <div class="vac-card">
      <img src="https://picsum.photos/200/150" alt="Maldives">
      <h3>Maldives</h3>
      <p>$800</p>
    </div>

    <div class="vac-card">
      <img src="https://picsum.photos/200/150" alt="Greece">
      <h3>Greece</h3>
      <p>$650</p>
    </div>

  </div>
</section>

<footer class="footer">
  <h3>Trabook</h3>
  <p>Your travel partner</p>
  <p>© 2026 All rights reserved</p>
</footer>

</body>
</html>
